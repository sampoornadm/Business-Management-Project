name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DATABASE_URL: postgresql://bmp:bmp_test_password@localhost:5432/bmp_test?schema=public
  REDIS_URL: redis://localhost:6379
  S3_ENDPOINT: http://localhost:9000
  S3_REGION: us-east-1
  S3_ACCESS_KEY_ID: bmp_minio
  S3_SECRET_ACCESS_KEY: bmp_minio_password
  S3_BUCKET: bmp-attachments-test
  S3_FORCE_PATH_STYLE: "true"
  SMTP_HOST: localhost
  SMTP_PORT: "1025"
  SMTP_FROM: "Business Management Platform <no-reply@bmp.local>"
  ACCESS_TOKEN_SECRET: ci_access_token_secret_change_me
  WEB_APP_URL: http://localhost:3000
  NEXT_PUBLIC_API_URL: http://localhost:4000/api/v1

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: bmp
          POSTGRES_PASSWORD: bmp_test_password
          POSTGRES_DB: bmp_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U bmp"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      minio:
        image: bitnami/minio:latest
        env:
          MINIO_ROOT_USER: bmp_minio
          MINIO_ROOT_PASSWORD: bmp_minio_password
          MINIO_DEFAULT_BUCKETS: bmp-attachments-test
        ports: ["9000:9000"]

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Generate Prisma client
        run: pnpm --filter @bmp/database generate

      - name: Run database migrations
        run: pnpm --filter @bmp/database migrate:deploy

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm turbo run test
