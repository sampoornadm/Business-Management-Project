name: bmp

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bmp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bmp_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-bmp}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bmp}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-bmp_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-bmp_minio_password}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    restart: "no"
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-bmp_minio} ${MINIO_ROOT_PASSWORD:-bmp_minio_password} &&
      mc mb --ignore-existing local/${S3_BUCKET:-bmp-attachments} &&
      mc anonymous set none local/${S3_BUCKET:-bmp-attachments} &&
      mc mb --ignore-existing local/${S3_BUCKET:-bmp-attachments}-test &&
      mc anonymous set none local/${S3_BUCKET:-bmp-attachments}-test
      "

  mailhog:
    image: mailhog/mailhog:latest
    restart: unless-stopped
    ports:
      - "${SMTP_PORT:-1025}:1025"
      - "${MAILHOG_WEB_PORT:-8025}:8025"

  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-bmp}:${POSTGRES_PASSWORD:-bmp_dev_password}@postgres:5432/${POSTGRES_DB:-bmp}?schema=public
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
      SMTP_HOST: mailhog
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "${SERVER_PORT:-4000}:4000"

  worker:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    command: ["./apps/server/node_modules/.bin/tsx", "apps/server/dist/worker.js"]
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-bmp}:${POSTGRES_PASSWORD:-bmp_dev_password}@postgres:5432/${POSTGRES_DB:-bmp}?schema=public
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
      SMTP_HOST: mailhog
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:${SERVER_PORT:-4000}/api/v1
    depends_on:
      - server
    ports:
      - "${WEB_PORT:-3000}:3000"

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    volumes:
      - ./infra/docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
      - server
    ports:
      - "8080:80"

  # Opt-in: `docker compose --profile backup up -d db-backup`. Runs infra/scripts/backup-db.sh
  # against the "postgres" service on a schedule (default: daily). Not started by plain
  # `docker compose up` — backups are an explicit choice, not a silent default.
  db-backup:
    image: postgres:16-alpine
    profiles: ["backup"]
    restart: unless-stopped
    entrypoint: >
      /bin/sh -c "
      while true; do
        pg_dump -h postgres -U ${POSTGRES_USER:-bmp} -d ${POSTGRES_DB:-bmp} --no-owner --no-privileges | gzip > /backups/${POSTGRES_DB:-bmp}-$$(date -u +%Y%m%dT%H%M%SZ).sql.gz;
        find /backups -name '${POSTGRES_DB:-bmp}-*.sql.gz' -type f -mtime +${BACKUP_RETENTION_DAYS:-14} -delete;
        sleep ${BACKUP_INTERVAL_SECONDS:-86400};
      done
      "
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:-bmp_dev_password}
    volumes:
      - ./backups:/backups
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
  redisdata:
  miniodata:
